graduate_students:
  - name: Trevor Alston
    image: /images/Trevor.jpg
    github: https://github.com/Trevorules
    email: trevor.alston@duke.edu
    linkedin: https://www.linkedin.com/in/trevor-alston
    desc: >-
      Trevor is a sixth-year Neurobiology graduate student at Duke
      University. He holds two Biomedical Engineering Degrees; he received
      his BS degree from Rutgers University and his MS degree from
      Northwestern University. His research interest is in Neuroengineering
      and brain-related technologies. Outside of the lab he likes hanging
      out with friends, playing games, and watching TV.

  - name: Miles Martinez
    title: Electrical and Computer Engineering PhD Candidate
    image: /images/miles.jpg
    github: https://github.com/mdmarti
    email: miles.martinez@duke.edu
    linkedin: https://www.linkedin.com/in/miles-martinez-00a496123/
    desc: >-
      Miles is a fifth-year graduate student in Electrical and Computer
      Engineering. He entered Duke through the CNAP program. He currently
      develops and applies computational methods to understand the neural
      bases of natural learning. When not doing research, he loves getting
      outside and hiking or rock climbing — unless it's too cold, in which
      case you can find him indoors cooking or playing games.

  - name: Ziyi Gong
    title: Neurobiology Graduate Student
    image: /images/gong.png
    scholar: https://scholar.google.com/citations?user=zOKHGPgAAAAJ
    github: https://github.com/gongziyida
    email: ziyi.gong@duke.edu
    desc: >-
      Ziyi is a fourth-year PhD candidate in Neurobiology. He received his
      B.S. in Computer Science with minors in Mathematics and Neuroscience
      from the University of Pittsburgh. He is interested in building
      mathematical models to summarize, explain, and predict phenomena
      observed in brains. Currently, he is developing models to explain how
      songbirds learn to sing. He previously worked with Dr. Nicolas Brunel
      on the roles of inhibition and inhibitory plasticity in the learning
      and memory of sequences. Outside of the lab he loves cooking and
      exercising, and occasionally plays the xiao (Chinese flute).

  - name: David St-Amand
    title: Neurobiology Graduate Student
    image: https://scholars.duke.edu/file/i6468953/image_6468953.JPG
    scholar: https://scholar.google.com/citations?user=Bc4NeD0AAAAJ
    github: https://github.com/DavidStA95
    email: david.st-amand@duke.edu
    desc: >-
      David is a third-year graduate student in Neurobiology. He graduated
      from McGill University, where he received his BS in Psychology and
      his MS in Neuroscience. His research investigates how efficient
      coding models can help us understand how information is computed in
      the retina. Outside the lab, he likes to work out and play games.

  - name: Shiyang Pan
    title: Electrical and Computer Engineering PhD Student
    image: /images/shiyang.jpg
    site: https://waaaaaterfall.github.io
    github: https://github.com/WaAaaAterfall
    email: shiyang.pan@duke.edu
    linkedin: https://www.linkedin.com/in/shiyangpan
    desc: >-
      Shiyang is a graduate student in Electrical &amp; Computer Engineering
      at Duke. She received her Bsc in Applied Mathematics from University
      of Liverpool and Xi'an Jiaotong-Liverpool University. Her research
      focuses on developing computational models and real-time methods to
      understand the activity of large-scale neural populations. When not
      doing research she enjoys music, reading, and creative writing.

  - name: Caitlin Lewis
    title: Electrical &amp; Computer Engineering PhD Student
    image: /images/caitlin.jpg
    github: https://github.com/clewis7
    email: caitlin.lewis@duke.edu
    linkedin: https://www.linkedin.com/in/caitlinllewis/
    desc: >-
      Caitlin is a second-year graduate student in Electrical &amp; Computer
      Engineering at Duke. She received her B.S. in Computer Science and
      Statistics from the University of North Carolina at Chapel Hill. Her
      research focuses on developing computational models and open-source
      software tools for real-time analysis and visualization of large-scale
      neural data. Outside of the lab, she enjoys reading and playing
      pickleball with friends.


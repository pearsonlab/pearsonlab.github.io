# Lab people data, rendered by people.html.
#
# One list per role. Each entry has an optional `current` flag:
#   current: true   (default — present member, renders as rich card)
#   current: false  (alumni — renders as a list item under "Former members")
#
# Moving someone to alumni is a one-line edit: set `current: false`,
# then optionally add `years` and `outcome`. You can keep their image,
# desc, and social links — the template only renders those for current
# members, but preserving them keeps history available for later.
#
# Card schema (used when current is true or absent):
#   name: string                     (required)
#   title: string                    (optional)
#   image: string                    (required, path under /images/)
#   desc: string                     (required, supports inline HTML)
#   site: string                     (optional, personal homepage)
#   github: string                   (optional)
#   email: string                    (optional)
#   linkedin: string                 (optional)
#   scholar: string                  (optional, Google Scholar URL)
#   bluesky: string                  (optional)
#   orcid: string                    (optional)
#
# Alumni-list schema (used when current is false):
#   name: string                     (required)
#   url: string                      (optional, what to wrap the name in)
#   years: string                    (optional, e.g. "2017" or "2015-2016")
#   notes: string                    (optional, HTML-safe parenthetical)
#   outcome: string                  (optional, HTML-safe trailing "→ ..." text)

pi:
  name: John Pearson
  image: /images/john.png
  site: http://jmxpearson.com
  github: https://github.com/jmxpearson
  email: john.pearson@duke.edu
  linkedin: https://www.linkedin.com/in/jmxpearson
  bluesky: https://bsky.app/profile/jmxpearson.bsky.social
  desc: >-
    John earned his bachelor's degree in physics and math from the University
    of Kentucky and his PhD in physics from Princeton. He became a neuroscientist
    at Duke, where he did his postdoctoral training with Michael Platt, working
    on the neurobiology of reward and decision-making. From 2015 to 2018, he was
    an Assistant Research Professor in the Duke Institute for Brain Sciences. In
    2018, he moved back to the School of Medicine as an Assistant Professor in
    the Department of Biostatistics &amp; Bioinformatics, and in 2022, he moved
    to the Department of Neurobiology, where he was promoted to Associate
    Professor in 2025. In addition, he maintains secondary appointments in the
    departments of Biostatics &amp; Bioinformatics, Psychology &amp;
    Neuroscience, and Electrical and Computer Engineering.
    (<a href="https://www.dropbox.com/scl/fi/o05n1v0skl5el9w938oca/john_pearson_cv.pdf?rlkey=wickra8h33u8hfsr40l0jdhxf&amp;st=8buq1yz2&amp;dl=0">cv</a>)

